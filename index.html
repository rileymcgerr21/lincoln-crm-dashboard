<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Lincoln CRM</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; }
  .panel-enter { transform: translateX(100%); }
  .panel-active { transform: translateX(0); }
  .skel { background: linear-gradient(90deg, #f1f5f9 0%, #e2e8f0 50%, #f1f5f9 100%); background-size: 200% 100%; animation: skel 1.2s infinite; }
  @keyframes skel { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
</style>
</head>
<body class="bg-slate-50 text-slate-900">

<!-- ─────── BOOT LOADER (shown while init() runs) ─────── -->
<div id="boot" class="min-h-screen flex items-center justify-center">
  <div class="text-center">
    <div class="inline-block w-8 h-8 border-2 border-slate-300 border-t-slate-900 rounded-full animate-spin"></div>
    <p class="mt-3 text-sm text-slate-500">Loading…</p>
  </div>
</div>

<!-- ─────── LOGIN SCREEN ─────── -->
<div id="login" class="hidden min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-sm bg-white rounded-xl shadow-lg p-8">
    <h1 class="text-2xl font-bold mb-1">Lincoln CRM</h1>
    <p class="text-slate-500 text-sm mb-6">Sign in to continue</p>
    <form id="loginForm" class="space-y-3">
      <input id="email" type="email" required placeholder="you@email.com"
             class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 focus:outline-none" />
      <button id="loginBtn" type="submit"
              class="w-full bg-slate-900 text-white py-2 rounded-lg font-medium hover:bg-slate-800 disabled:opacity-50">
        Send magic link
      </button>
    </form>
    <p id="loginMsg" class="text-sm mt-4 hidden"></p>
  </div>
</div>

<!-- ─────── DASHBOARD ─────── -->
<div id="app" class="hidden">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
    <div class="max-w-screen-2xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <h1 class="text-lg font-bold">Lincoln CRM</h1>
        <span id="totals" class="text-sm text-slate-500"></span>
      </div>
      <div class="flex items-center gap-3">
        <span id="userEmail" class="text-sm text-slate-600 hidden sm:inline"></span>
        <button id="signOutBtn" class="text-sm text-slate-500 hover:text-slate-900">Sign out</button>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="max-w-screen-2xl mx-auto px-4 pb-3 flex items-center gap-2 flex-wrap">
      <button data-filter="all"      class="filter-chip px-3 py-1 rounded-full text-sm bg-slate-900 text-white">All <span class="opacity-60 ml-1" data-count="all"></span></button>
      <button data-filter="severe"   class="filter-chip px-3 py-1 rounded-full text-sm bg-slate-100 text-slate-700 hover:bg-slate-200">Severe 8+ <span class="opacity-60 ml-1" data-count="severe"></span></button>
      <button data-filter="moderate" class="filter-chip px-3 py-1 rounded-full text-sm bg-slate-100 text-slate-700 hover:bg-slate-200">Moderate 6+ <span class="opacity-60 ml-1" data-count="moderate"></span></button>
      <button data-filter="oos"      class="filter-chip px-3 py-1 rounded-full text-sm bg-slate-100 text-slate-700 hover:bg-slate-200">Out-of-state <span class="opacity-60 ml-1" data-count="oos"></span></button>
      <button data-filter="phoned"   class="filter-chip px-3 py-1 rounded-full text-sm bg-slate-100 text-slate-700 hover:bg-slate-200">Has phone <span class="opacity-60 ml-1" data-count="phoned"></span></button>
      <button data-filter="entity"   class="filter-chip px-3 py-1 rounded-full text-sm bg-slate-100 text-slate-700 hover:bg-slate-200">LLC/Trust <span class="opacity-60 ml-1" data-count="entity"></span></button>
      <div class="ml-auto">
        <input id="search" type="search" placeholder="Search owner or address…"
               class="px-3 py-1 border border-slate-300 rounded-lg text-sm w-64 focus:ring-2 focus:ring-slate-900 focus:outline-none" />
      </div>
    </div>
  </header>

  <!-- Lead list -->
  <main class="max-w-screen-2xl mx-auto px-4 py-4">
    <div id="leadList" class="space-y-2"></div>
    <p id="emptyMsg" class="hidden text-center text-slate-500 py-12">No leads match your filters.</p>
  </main>
</div>

<!-- ─────── DETAIL SIDE PANEL ─────── -->
<div id="overlay" class="hidden fixed inset-0 bg-black/40 z-40" onclick="closePanel()"></div>
<aside id="panel" class="hidden fixed top-0 right-0 h-full w-full max-w-lg bg-white shadow-2xl z-50 overflow-y-auto panel-enter transition-transform duration-200">
  <div id="panelContent" class="p-6"></div>
</aside>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.49.4'

// ─────── CONFIG ───────
const SUPABASE_URL = 'https://liaofyzwtoehsxppmibn.supabase.co'
const SUPABASE_KEY = 'sb_publishable_8kKojgOv_7-WHVDfsf2M-g_-HZ1g4ub'
const ALLOWED_EMAILS = ['rileymcgerr@gmail.com', 'danielbecher123@gmail.com']

const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

// ─────── STATE ───────
let leads = []
let filtered = []
let currentFilter = 'all'
let searchTerm = ''
let session = null

// ─────── AUTH ───────
async function init() {
  const { data: { session: s } } = await sb.auth.getSession()
  session = s
  if (!session) return showLogin()

  // Allowlist check
  if (!ALLOWED_EMAILS.includes(session.user.email)) {
    await sb.auth.signOut()
    return showLogin('That email is not on the allowlist.')
  }

  showApp()
  await loadLeads()
}

function showLogin(msg) {
  document.getElementById('boot').classList.add('hidden')
  document.getElementById('login').classList.remove('hidden')
  document.getElementById('app').classList.add('hidden')
  if (msg) {
    const m = document.getElementById('loginMsg')
    m.textContent = msg
    m.className = 'text-sm mt-4 text-red-600'
  }
}

function showApp() {
  document.getElementById('boot').classList.add('hidden')
  document.getElementById('login').classList.add('hidden')
  document.getElementById('app').classList.remove('hidden')
  document.getElementById('userEmail').textContent = session.user.email
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault()
  const email = document.getElementById('email').value.trim().toLowerCase()
  const btn = document.getElementById('loginBtn')
  const msg = document.getElementById('loginMsg')

  if (!ALLOWED_EMAILS.includes(email)) {
    msg.textContent = 'That email is not allowed to access this dashboard.'
    msg.className = 'text-sm mt-4 text-red-600'
    return
  }

  btn.disabled = true
  btn.textContent = 'Sending…'
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + window.location.pathname }
  })
  btn.disabled = false
  btn.textContent = 'Send magic link'
  if (error) {
    msg.textContent = error.message
    msg.className = 'text-sm mt-4 text-red-600'
  } else {
    msg.textContent = `Check your inbox at ${email} for the sign-in link.`
    msg.className = 'text-sm mt-4 text-green-700'
  }
})

document.getElementById('signOutBtn').addEventListener('click', async () => {
  await sb.auth.signOut()
  location.reload()
})

// ─────── DATA ───────
async function loadLeads() {
  const { data, error } = await sb
    .from('leads')
    .select(`
      id, owner_first_name, owner_last_name, owner_full_name, owner_entity_name,
      parcel_id_primary, property_address, property_zip,
      mailing_address, mailing_city, mailing_state, mailing_zip, is_absentee,
      primary_phone, secondary_phone, email,
      distress_score, distress_notes, year_built, assessed_value,
      photo_url, assessor_url,
      current_stage, priority, notes, tags,
      created_at, updated_at,
      lead_sources(source)
    `)
    .is('deleted_at', null)
    .order('priority', { ascending: false })
    .order('distress_score', { ascending: false, nullsFirst: false })
    .limit(2000)

  if (error) {
    document.getElementById('leadList').innerHTML =
      `<div class="bg-red-50 text-red-700 p-4 rounded-lg">Couldn't load leads: ${escape(error.message)}</div>`
    return
  }

  leads = data || []
  applyFilters()
  updateTotals()
}

function updateTotals() {
  const counts = {
    all:      leads.length,
    severe:   leads.filter(l => l.distress_score >= 8).length,
    moderate: leads.filter(l => l.distress_score >= 6).length,
    oos:      leads.filter(l => l.is_absentee && l.mailing_state && l.mailing_state !== 'NE').length,
    phoned:   leads.filter(l => l.primary_phone).length,
    entity:   leads.filter(l => l.owner_entity_name).length,
  }
  const fresh = leads.filter(l => l.current_stage === 'new').length
  document.getElementById('totals').innerHTML =
    `<span class="font-semibold text-slate-900">${counts.all}</span> leads · ` +
    `<span class="text-red-600 font-medium">${counts.severe} severe</span> · ` +
    `<span>${counts.phoned} phoned</span> · ` +
    `<span>${fresh} new</span>`
  // Populate chip counts
  document.querySelectorAll('[data-count]').forEach(el => {
    const k = el.dataset.count
    el.textContent = counts[k] != null ? `(${counts[k]})` : ''
  })
}

// ─────── FILTERS + SEARCH ───────
function applyFilters() {
  filtered = leads.filter(l => {
    if (currentFilter === 'severe'   && !(l.distress_score >= 8)) return false
    if (currentFilter === 'moderate' && !(l.distress_score >= 6)) return false
    if (currentFilter === 'oos'      && (l.mailing_state === 'NE' || !l.is_absentee)) return false
    if (currentFilter === 'phoned'   && !l.primary_phone) return false
    if (currentFilter === 'entity'   && !l.owner_entity_name) return false
    if (searchTerm) {
      const hay = [l.owner_full_name, l.owner_entity_name, l.property_address, l.mailing_city, l.parcel_id_primary]
        .filter(Boolean).join(' ').toLowerCase()
      if (!hay.includes(searchTerm)) return false
    }
    return true
  })
  renderList()
}

document.querySelectorAll('.filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(b => {
      b.className = 'filter-chip px-3 py-1 rounded-full text-sm bg-slate-100 text-slate-700 hover:bg-slate-200'
    })
    btn.className = 'filter-chip px-3 py-1 rounded-full text-sm bg-slate-900 text-white'
    currentFilter = btn.dataset.filter
    applyFilters()
  })
})

document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim().toLowerCase()
  applyFilters()
})

// ─────── RENDERING ───────
function renderList() {
  const container = document.getElementById('leadList')
  const empty = document.getElementById('emptyMsg')
  if (filtered.length === 0) {
    container.innerHTML = ''
    empty.classList.remove('hidden')
    return
  }
  empty.classList.add('hidden')
  container.innerHTML = filtered.map(renderRow).join('')
  container.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', () => openPanel(el.dataset.id))
  })
}

function renderRow(l) {
  const score = l.distress_score
  const scoreColor =
    score >= 8 ? 'bg-red-600 text-white' :
    score >= 6 ? 'bg-amber-500 text-white' :
    score >= 4 ? 'bg-slate-300 text-slate-700' :
    'bg-slate-100 text-slate-500'
  const owner = l.owner_entity_name
    ? `<span class="text-slate-700">🏢 ${escape(l.owner_entity_name)}</span>`
    : escape(l.owner_full_name || '(unknown)')
  const mail = l.is_absentee
    ? (l.mailing_state && l.mailing_state !== 'NE'
        ? `<span class="text-red-600">📬 out: ${escape(l.mailing_city || '')}, ${escape(l.mailing_state)}</span>`
        : `<span class="text-amber-600">📬 abs: ${escape(l.mailing_city || '')}, ${escape(l.mailing_state || '')}</span>`)
    : `<span class="text-slate-400">owner-occ</span>`
  const phone = l.primary_phone ? `<span class="text-green-600">☎</span>` : `<span class="text-slate-300">·</span>`
  const stage = l.current_stage !== 'new'
    ? `<span class="text-xs px-2 py-0.5 rounded-full bg-slate-200 text-slate-700">${escape(l.current_stage)}</span>`
    : ''

  return `
  <div data-id="${l.id}" class="bg-white border border-slate-200 rounded-xl p-3 flex items-center gap-4 cursor-pointer hover:border-slate-400 transition">
    <div class="w-20 h-20 flex-shrink-0 rounded-lg overflow-hidden bg-slate-100">
      ${l.photo_url ? `<img src="${escape(l.photo_url)}" loading="lazy" referrerpolicy="no-referrer" class="w-full h-full object-cover" onerror="this.style.display='none'">` : ''}
    </div>
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2 mb-1">
        <span class="px-2 py-0.5 rounded-md text-xs font-bold ${scoreColor}">${score != null ? Number(score).toFixed(1) : '—'}</span>
        <span class="font-semibold truncate">${owner}</span>
        ${stage}
      </div>
      <div class="text-sm text-slate-700 truncate">${escape(l.property_address || '(no address)')}</div>
      <div class="text-xs text-slate-500 truncate mt-1">
        ${l.year_built ? `${l.year_built} · ` : ''}
        ${l.assessed_value ? `$${l.assessed_value.toLocaleString()} · ` : ''}
        ${mail} · ${phone}
      </div>
    </div>
  </div>`
}

// ─────── DETAIL PANEL ───────
window.closePanel = () => {
  const p = document.getElementById('panel')
  const o = document.getElementById('overlay')
  p.classList.remove('panel-active')
  p.classList.add('panel-enter')
  setTimeout(() => { p.classList.add('hidden'); o.classList.add('hidden') }, 200)
}

function openPanel(id) {
  const l = leads.find(x => x.id === id)
  if (!l) return
  const sources = (l.lead_sources || []).map(s => s.source).join(', ') || '—'
  const phoneRow = l.primary_phone
    ? `<div class="text-green-700 font-medium">☎ ${escape(l.primary_phone)}${l.secondary_phone ? ` · ${escape(l.secondary_phone)}` : ''}</div>`
    : `<div class="text-slate-400">No phone yet (skip-trace pending)</div>`

  document.getElementById('panelContent').innerHTML = `
    <div class="flex items-start justify-between mb-4">
      <button onclick="closePanel()" class="text-slate-500 hover:text-slate-900 text-2xl leading-none">✕</button>
      <div class="flex gap-2">
        <a href="${escape(l.assessor_url || '#')}" target="_blank" rel="noopener" class="text-sm text-blue-600 hover:underline ${l.assessor_url ? '' : 'pointer-events-none opacity-30'}">Assessor →</a>
      </div>
    </div>

    ${l.photo_url ? `<img src="${escape(l.photo_url)}" referrerpolicy="no-referrer" class="w-full rounded-lg mb-4 bg-slate-100">` : ''}

    <div class="mb-4">
      <div class="flex items-center gap-2 mb-1">
        <span class="px-2 py-0.5 rounded-md text-xs font-bold ${
          l.distress_score >= 8 ? 'bg-red-600 text-white' :
          l.distress_score >= 6 ? 'bg-amber-500 text-white' : 'bg-slate-200 text-slate-700'
        }">${l.distress_score != null ? Number(l.distress_score).toFixed(1) : '—'}</span>
        <h2 class="text-xl font-bold">${escape(l.owner_entity_name || l.owner_full_name || '(unknown)')}</h2>
      </div>
      <div class="text-slate-700">${escape(l.property_address || '')}</div>
      <div class="text-xs text-slate-400">parcel ${escape(l.parcel_id_primary)}</div>
    </div>

    ${l.distress_notes ? `<div class="mb-4 p-3 bg-amber-50 border border-amber-200 rounded-lg text-sm text-amber-900">${escape(l.distress_notes)}</div>` : ''}

    <dl class="grid grid-cols-2 gap-x-4 gap-y-2 text-sm mb-4">
      <dt class="text-slate-500">Year built</dt>           <dd>${l.year_built || '—'}</dd>
      <dt class="text-slate-500">Assessed value</dt>       <dd>${l.assessed_value ? '$' + l.assessed_value.toLocaleString() : '—'}</dd>
      <dt class="text-slate-500">Mailing</dt>              <dd>${escape([l.mailing_address, l.mailing_city, l.mailing_state, l.mailing_zip].filter(Boolean).join(', ') || '—')}</dd>
      <dt class="text-slate-500">Cohorts</dt>              <dd>${escape(sources)}</dd>
      <dt class="text-slate-500">Stage</dt>                <dd>${escape(l.current_stage)}</dd>
      <dt class="text-slate-500">Priority</dt>             <dd>${l.priority}</dd>
    </dl>

    <div class="mb-4">
      <h3 class="text-xs font-semibold uppercase text-slate-500 mb-1">Phone</h3>
      ${phoneRow}
    </div>

    <div class="mb-4">
      <h3 class="text-xs font-semibold uppercase text-slate-500 mb-1">Notes</h3>
      <textarea id="notesField" class="w-full border border-slate-300 rounded-lg p-2 text-sm" rows="3">${escape(l.notes || '')}</textarea>
      <button id="saveNotesBtn" class="mt-2 text-sm bg-slate-900 text-white px-3 py-1 rounded-lg hover:bg-slate-800">Save notes</button>
      <span id="saveStatus" class="ml-2 text-sm text-green-600 hidden">Saved.</span>
    </div>

    <div class="border-t border-slate-200 pt-4 mt-4">
      <h3 class="text-xs font-semibold uppercase text-slate-500 mb-2">Actions</h3>
      <div class="flex flex-wrap gap-2">
        <button class="action-btn px-3 py-1 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm" data-action="bump">+ Priority 10</button>
        <button class="action-btn px-3 py-1 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm" data-action="drop">− Priority 10</button>
        <button class="action-btn px-3 py-1 bg-amber-50 hover:bg-amber-100 text-amber-800 rounded-lg text-sm" data-action="not_interested">Not interested</button>
        <button class="action-btn px-3 py-1 bg-red-50 hover:bg-red-100 text-red-800 rounded-lg text-sm" data-action="do_not_contact">Do not contact</button>
        <button class="action-btn px-3 py-1 bg-green-50 hover:bg-green-100 text-green-800 rounded-lg text-sm" data-action="reset">Reset to new</button>
      </div>
    </div>
  `

  document.getElementById('saveNotesBtn').addEventListener('click', async () => {
    const notes = document.getElementById('notesField').value
    const { error } = await sb.from('leads').update({ notes }).eq('id', id)
    if (error) return alert('Save failed: ' + error.message)
    l.notes = notes
    const s = document.getElementById('saveStatus')
    s.classList.remove('hidden'); setTimeout(() => s.classList.add('hidden'), 2000)
  })

  document.querySelectorAll('.action-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const action = btn.dataset.action
      let patch = {}
      if (action === 'bump') patch.priority = Math.min(100, (l.priority || 0) + 10)
      if (action === 'drop') patch.priority = Math.max(0,   (l.priority || 0) - 10)
      if (action === 'not_interested')  patch.current_stage = 'not_interested'
      if (action === 'do_not_contact')  patch.current_stage = 'do_not_contact'
      if (action === 'reset')           patch.current_stage = 'new'
      const { error } = await sb.from('leads').update(patch).eq('id', id)
      if (error) return alert('Update failed: ' + error.message)
      Object.assign(l, patch)
      // Refresh the row in the list
      applyFilters(); updateTotals(); openPanel(id)
    })
  })

  const o = document.getElementById('overlay')
  const p = document.getElementById('panel')
  o.classList.remove('hidden'); p.classList.remove('hidden')
  requestAnimationFrame(() => { p.classList.remove('panel-enter'); p.classList.add('panel-active') })
}

// ─────── HELPERS ───────
function escape(s) {
  if (s == null) return ''
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
}

// ─────── BOOT ───────
init()
// React to sign-in / sign-out WITHOUT reloading. (The previous version reloaded
// on every state change, which created an infinite loop because the closure
// `session` var resets to null on every load.)
sb.auth.onAuthStateChange((event, s) => {
  if (event === 'SIGNED_IN' && s && !session) {
    session = s
    if (ALLOWED_EMAILS.includes(session.user.email)) { showApp(); loadLeads() }
    else { sb.auth.signOut().then(() => showLogin('That email is not on the allowlist.')) }
  } else if (event === 'SIGNED_OUT') {
    session = null
    showLogin()
  }
})
</script>
</body>
</html>
