        <div id="offerClosedWrap_${l.id}" class="${showClosed ? '' : 'hidden'}">
          <label class="block">
            <span class="text-[10px] uppercase tracking-wider text-slate-400 font-semibold">Closed price</span>
            <input id="closedPrice_${l.id}" type="number" min="0" step="500" value="${l.closed_price || ''}"
              class="mt-1 w-full bg-ink-900 border border-ink-700 rounded-lg px-2 py-1.5 text-slate-200 focus:border-emerald-500 focus:outline-none"
              placeholder="Final purchase price" />
          </label>
        </div>
        <label class="block">
          <span class="text-[10px] uppercase tracking-wider text-slate-400 font-semibold">Outcome notes</span>
          <textarea id="outcomeNotes_${l.id}" rows="2"
            class="mt-1 w-full bg-ink-900 border border-ink-700 rounded-lg px-2 py-1.5 text-slate-200 focus:border-cyan-500 focus:outline-none resize-none"
            placeholder="Brief note: what happened, any context for the next deal">${escape(l.outcome_notes || '')}</textarea>
        </label>
        <div class="flex items-center gap-2 pt-1">
          <button id="saveOfferBtn_${l.id}" class="px-3 py-1.5 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg text-sm font-medium">Save</button>
          <span id="saveOfferStatus_${l.id}" class="text-xs text-slate-500"></span>
          ${sent ? `<span class="ml-auto text-[9px] text-slate-500">first sent ${sent}${closed ? ' · closed ' + closed : ''}</span>` : ''}
        </div>
      </div>
    </details>
  `
}

async function saveOffer(leadId) {
  const $ = (id) => document.getElementById(id + '_' + leadId)
  const amount   = parseFloat($('offerAmount').value) || null
  const response = $('offerResponse').value || null
  const counter  = parseFloat($('counterAmount').value) || null
  const closed   = parseFloat($('closedPrice').value) || null
  const notes    = $('outcomeNotes').value.trim() || null
  const status   = $('saveOfferStatus')

  // Find the existing lead to compare against (decide if offer_sent_at / closed_at need stamping)
  const lead = leads.find(x => x.id === leadId)
  const wasJustSent = amount && !lead?.offer_sent_at
  const wasJustClosed = closed && !lead?.closed_at

  const patch = {
    offer_amount: amount,
    offer_response: response,
    counter_amount: counter,
    closed_price: closed,
    outcome_notes: notes,
  }
  if (wasJustSent) patch.offer_sent_at = new Date().toISOString()
  if (wasJustClosed) patch.closed_at = new Date().toISOString()

  status.textContent = 'saving…'
  status.className = 'text-xs text-slate-500'
  const { error } = await sb.from('leads').update(patch).eq('id', leadId)
  if (error) {
    status.textContent = 'error: ' + error.message
    status.className = 'text-xs text-rose-300'
    return
  }
  // Update local cache so re-renders are consistent
  if (lead) Object.assign(lead, patch)
  status.textContent = '✓ saved'
  status.className = 'text-xs text-emerald-400'
  setTimeout(() => { status.textContent = '' }, 2500)
}

function bindOfferForm(leadId) {
  const $ = (id) => document.getElementById(id + '_' + leadId)
  const respSel = $('offerResponse')
  const counterWrap = $('offerCounterWrap')
  const closedWrap = $('offerClosedWrap')
  const saveBtn = $('saveOfferBtn')
  if (respSel) {
    respSel.addEventListener('change', (e) => {
      const v = e.target.value
      if (counterWrap) counterWrap.classList.toggle('hidden', v !== 'countered')
      if (closedWrap)  closedWrap.classList.toggle('hidden', v !== 'accepted' && v !== 'fell_through')
    })
  }
  if (saveBtn) {
    saveBtn.addEventListener('click', () => saveOffer(leadId))
  }
}

function renderDealSection(l) {
  if (!l.deal) {
    return `<div class="mb-5 p-3 bg-ink-850 border border-ink-700 rounded-lg text-sm text-slate-500">No deal score yet for this property.</div>`
  }
  const d = l.deal
  const tier = d.score_tier
  const tierBadge = {
    elite:           '<span class="px-2 py-0.5 rounded-md text-xs font-black bg-gradient-to-r from-amber-400 to-pink-500 text-white">⭐ ELITE</span>',
    high_confidence: '<span class="px-2 py-0.5 rounded-md text-xs font-bold bg-emerald-500 text-white">HIGH CONFIDENCE</span>',
    decent:          '<span class="px-2 py-0.5 rounded-md text-xs font-bold bg-blue-500 text-white">DECENT</span>',
    low:             '<span class="px-2 py-0.5 rounded-md text-xs font-medium bg-slate-700 text-slate-300">LOW</span>',
  }[tier] || ''

  const flags = (d.flags || '').split(';').filter(Boolean).map(humanizeFlag)
  const flagsHtml = flags.length
    ? flags.map(f => `<span class="text-xs px-2 py-1 rounded-md ${f.cls}">${escape(f.label)}</span>`).join(' ')
    : '<span class="text-xs text-slate-500">No flags</span>'

  // Rehab-flipper economics (kept for comparison)
  const arv      = d.arv_estimate
  const rehab    = d.rehab_estimate
  const offer    = d.suggested_offer
  // Wholesale economics (your model — buy at 75% of as-is, sell as-is)
  const asIs     = d.as_is_estimate
  const wOffer   = d.wholesale_offer
  const wMargin  = d.wholesale_margin
  const nbhN     = d.nbh_comps_used
  const pSource  = d.pricing_source
  const sourceLabel = pSource === 'nbh_specific' ? `${nbhN || 0} nbh comps`
                    : pSource === 'nbh_thin'     ? `thin (${nbhN || 0})`
                    : pSource === 'city_wide'    ? 'city-wide fallback'
                    : ''

  const wholesaleHtml = (asIs || wOffer || wMargin)
    ? `<div class="mt-3">
        <div class="flex items-center justify-between mb-1.5">
          <div class="text-[10px] font-bold uppercase tracking-wider text-cyan-300">Your wholesale numbers</div>
          ${sourceLabel ? `<div class="text-[9px] text-slate-500">${escape(sourceLabel)}</div>` : ''}
        </div>
        <div class="grid grid-cols-3 gap-2">
          <div class="bg-ink-950/40 border border-ink-700 rounded-lg p-2.5">
            <div class="text-[9px] uppercase tracking-wider text-slate-500 font-semibold">As-is value</div>
            <div class="text-base font-bold text-slate-200 mt-0.5">${asIs ? '$' + Number(asIs).toLocaleString() : '—'}</div>
          </div>
          <div class="bg-cyan-500/10 border border-cyan-500/30 rounded-lg p-2.5">
            <div class="text-[9px] uppercase tracking-wider text-cyan-400 font-semibold">Your offer (75%)</div>
            <div class="text-base font-black text-cyan-300 mt-0.5">${wOffer ? '$' + Number(wOffer).toLocaleString() : '—'}</div>
          </div>
          <div class="bg-ink-950/40 border border-ink-700 rounded-lg p-2.5">
            <div class="text-[9px] uppercase tracking-wider text-slate-500 font-semibold">Margin</div>
            <div class="text-base font-bold text-emerald-300 mt-0.5">${wMargin ? '$' + Number(wMargin).toLocaleString() : '—'}</div>
          </div>
        </div>
      </div>` : ''

  // Negotiation ladder: first offer (anchor) → walk-up max → hard ceiling.
  // first offer = 60% of rehabber MAO  (will switch to deal_rankings.starting_offer when buddy ships it)
  // walk-up max = wholesale_offer (75% of as-is)
  // hard ceiling = rehabber MAO (suggested_offer)
  // Prefer buddy's authoritative starting_offer column if present, else compute 60% of MAO client-side
  // Ladder anchored on wholesale_offer (= 0.75 * as_is), empirically validated
  // against Omel's actual wholesale buy:sell ratio of 0.78 (n=5 quick flips
  // held <90 days, 2019-2022). The rehabber MAO (suggested_offer) is shown
  // separately in backing math as a competitor reference, not the ceiling.
  const ceiling    = wOffer || null
  const firstOffer = d.starting_offer ?? (ceiling ? Math.round(Number(ceiling) * 0.60) : null)
  const walkUp     = ceiling != null ? Math.round(Number(ceiling) * 0.85) : null
  const ladderHtml = (firstOffer || walkUp || ceiling)
    ? `<div class="mt-3">
        <div class="text-[10px] font-bold uppercase tracking-wider text-emerald-300 mb-1.5">📈 Negotiation Ladder · what to actually offer</div>
        <div class="grid grid-cols-3 gap-2">
          <div class="bg-emerald-500/15 border border-emerald-500/40 rounded-lg p-2.5">
            <div class="text-[9px] uppercase tracking-wider text-emerald-400 font-bold">First offer</div>
            <div class="text-lg font-black text-emerald-300 mt-0.5">${firstOffer ? '$' + Number(firstOffer).toLocaleString() : '—'}</div>
            <div class="text-[9px] text-emerald-500/80 mt-0.5">your text/letter anchor</div>
          </div>
          <div class="bg-amber-500/10 border border-amber-500/30 rounded-lg p-2.5">
            <div class="text-[9px] uppercase tracking-wider text-amber-400 font-bold">Walk-up max</div>
            <div class="text-lg font-black text-amber-300 mt-0.5">${walkUp ? '$' + Number(walkUp).toLocaleString() : '—'}</div>
            <div class="text-[9px] text-amber-500/80 mt-0.5">your stretch — still profitable</div>
          </div>
          <div class="bg-red-500/10 border border-red-500/30 rounded-lg p-2.5">
            <div class="text-[9px] uppercase tracking-wider text-red-400 font-bold">Hard ceiling</div>
            <div class="text-lg font-black text-red-300 mt-0.5">${ceiling ? '$' + Number(ceiling).toLocaleString() : '—'}</div>
            <div class="text-[9px] text-red-500/80 mt-0.5">walk away above this</div>
          </div>
        </div>
        <div class="text-[10px] text-slate-500 mt-1.5">Tip: text the first offer. Negotiate up to walk-up. Walk away if they push past ceiling.</div>
      </div>` : ''

  // Underlying numbers — 5 cards (ARV, Rehab, As-is model, As-is strata, Rehabber MAO)
  // Strata card uses (year_built x sqft x condition) lookup as independent estimate.
  // Divergence >=20% from model gets amber/rose badge to flag review.
  const compCheck = d.as_is_comp_check
  const dev       = d.comp_check_deviation_pct
  const compN     = d.comp_check_n
  const compTooltip = 'Independent estimate from ' + (compN || 'N/A') + ' comps in same year_built+sqft band.' + (dev != null ? ' ' + dev + '% off model.' : '')
  const compClass = dev == null ? 'bg-ink-950/40 border-ink-700'
                  : dev >= 35   ? 'bg-rose-500/15 border-rose-500/40'
                  : dev >= 20   ? 'bg-amber-500/15 border-amber-500/40'
                  : 'bg-ink-950/40 border-ink-700'
  const compBadge = dev != null && dev >= 20
    ? ' <span class="text-[8px] px-1 py-0.5 rounded ' + (dev >= 35 ? 'bg-rose-500/30 text-rose-200' : 'bg-amber-500/30 text-amber-200') + ' ml-1">' + dev + '% Δ</span>'
    : ''

  const econHtml = (arv || offer || asIs || compCheck)
    ? `<div class="mt-3">
        <div class="text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1.5">📊 Underlying numbers</div>
        <div class="grid grid-cols-4 gap-2">
          <div class="bg-ink-950/40 border border-ink-700 rounded-lg p-2.5">
            <div class="text-[9px] uppercase tracking-wider text-slate-500 font-semibold">ARV</div>
            <div class="text-sm font-bold text-slate-200 mt-0.5">${arv ? '$' + Number(arv).toLocaleString() : '—'}</div>
          </div>
          <div class="bg-ink-950/40 border border-ink-700 rounded-lg p-2.5">
            <div class="text-[9px] uppercase tracking-wider text-slate-500 font-semibold">As-is${sourceLabel ? ' · ' + sourceLabel : ''}</div>
            <div class="text-sm font-bold text-slate-200 mt-0.5">${asIs ? '$' + Number(asIs).toLocaleString() : '—'}</div>
          </div>
          <div class="${compClass} border rounded-lg p-2.5" title="${escape(compTooltip)}">
            <div class="text-[9px] uppercase tracking-wider text-slate-500 font-semibold">Comps${compBadge}</div>
            <div class="text-sm font-bold text-slate-200 mt-0.5">${compCheck ? '$' + Number(compCheck).toLocaleString() : '—'}</div>
          </div>
          <div class="bg-ink-950/40 border border-ink-700 rounded-lg p-2.5" title="What a rehabber would max-pay using ARV*0.7 - rehab. Competitor reference, not your ceiling.">
            <div class="text-[9px] uppercase tracking-wider text-slate-500 font-semibold">Rehabber MAO</div>
            <div class="text-sm font-bold text-slate-400 mt-0.5">${offer ? '$' + Number(offer).toLocaleString() : '—'}</div>
          </div>
        </div>
      </div>` : ''

  // Combine: ladder is the primary CTA, underlying numbers below
  const allHtml = ladderHtml + econHtml

  return `
    <div class="mb-5 p-4 bg-gradient-to-br from-indigo-900/20 to-ink-850 border border-indigo-500/20 rounded-xl">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="text-[10px] font-bold uppercase tracking-wider text-indigo-300">Deal Score</span>
          <span class="text-3xl font-black text-white">${d.score ?? '—'}</span>
          ${tierBadge}
        </div>
      </div>
      <div class="text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-2">Why it scores this way</div>
      <div class="flex flex-wrap gap-1.5">${flagsHtml}</div>
      ${allHtml}
    </div>`
}

function humanizeFlag(f) {
  // Parse buddy's flag strings into human labels with appropriate color
  const oos = f.match(/^oos_([A-Z]{2})$/)
  if (oos)                                 return { label: `Out-of-state owner (${oos[1]})`,        cls: 'bg-red-500/15 text-red-300 border border-red-500/30' }
  if (f === 'absentee_in_state')           return { label: 'Absentee (in-state)',                   cls: 'bg-amber-500/15 text-amber-300 border border-amber-500/30' }
  if (f === 'individual_owner')            return { label: 'Individual owner',                       cls: 'bg-slate-700/50 text-slate-300 border border-slate-600' }
  if (f === 'estate_or_trust_owner')       return { label: 'Estate / trust owner',                   cls: 'bg-violet-500/15 text-violet-300 border border-violet-500/30' }
  if (f === 'llc_owner')                   return { label: 'LLC owner',                              cls: 'bg-slate-700/50 text-slate-300 border border-slate-600' }
  if (f === 'held_pre_2013')               return { label: 'Long-held (pre-2013)',                   cls: 'bg-cyan-500/15 text-cyan-300 border border-cyan-500/30' }
  const taxd = f.match(/^tax_delinquent_\$(\d+)/)
  if (taxd)                                return { label: `Tax delinquent ($${Number(taxd[1]).toLocaleString()})`, cls: 'bg-orange-500/15 text-orange-300 border border-orange-500/30' }
  if (f === 'comp_buy_box')                return { label: 'Fits buy box',                           cls: 'bg-emerald-500/15 text-emerald-300 border border-emerald-500/30' }
  const vintage = f.match(/^v_(\d{4})_(\d+)$/)
  if (vintage)                             return { label: `Vintage ${vintage[1]}–${(parseInt(vintage[1]) + parseInt(vintage[2]))}`, cls: 'bg-blue-500/15 text-blue-300 border border-blue-500/30' }
  if (f === 'multifamily')                 return { label: 'Multi-family',                           cls: 'bg-pink-500/15 text-pink-300 border border-pink-500/30' }
  if (f === 'pro_owner')                   return { label: '⚠ Pro / wholesaler owned',               cls: 'bg-rose-500/15 text-rose-300 border border-rose-500/30' }
  if (f === 'known_flipper')               return { label: '⚠ Known flipper',                        cls: 'bg-fuchsia-500/15 text-fuchsia-300 border border-fuchsia-500/30' }
  // Fallback: show raw
  return { label: f, cls: 'bg-slate-700/50 text-slate-300 border border-slate-600' }
}

async function loadMessages(leadId) {
  const wrap = document.getElementById('messagesList'); if (!wrap) return
  const { data, error } = await sb.from('touches')
    .select('id, direction, channel, body, sent_at, delivered_at, created_at, status, from_number, to_number')
    .eq('lead_id', leadId).order('created_at', { ascending: true }).limit(100)
  if (error) { wrap.innerHTML = `<span class="text-red-400">Error: ${escape(error.message)}</span>`; return }
  if (!data || data.length === 0) { wrap.innerHTML = `<span class="text-slate-500">No messages yet.</span>`; return }
  wrap.innerHTML = data.map(t => {
    const out = t.direction === 'outbound'
    const time = new Date(t.sent_at || t.created_at).toLocaleString()
    return `
      <div class="flex ${out ? 'justify-end' : 'justify-start'}">
        <div class="${out ? 'bg-indigo-600 text-white' : 'bg-ink-850 text-slate-200 border border-ink-700'} max-w-[85%] rounded-lg px-3 py-2">
          <div class="text-[10px] opacity-70 mb-0.5 uppercase tracking-wide">${escape(t.channel)} ${out ? '→' : '←'} ${escape(time)}${t.status ? ' · ' + escape(t.status) : ''}</div>
          <div class="whitespace-pre-wrap text-sm">${escape(t.body || '')}</div>
        </div>
      </div>`
  }).join('')
}

// ─────── HELPERS + CSV + BULK ───────
function escape(s) {
  if (s == null) return ''
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
}
function csvCell(v) {
  if (v === null || v === undefined) return ''
  const s = Array.isArray(v) ? v.join('|') : String(v)
  return /[",\n\r]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s
}
function downloadCsv(rows, filename) {
  const cols = ['id','owner_full_name','owner_entity_name','property_address','parcel_id_primary',
    'mailing_address','mailing_city','mailing_state','mailing_zip',
    'deal_score','deal_tier','arv_estimate','rehab_estimate','suggested_offer','deal_flags',
    'distress_score','year_built','assessed_value','primary_phone','secondary_phone',
    'current_stage','priority','tags','cohorts','distress_notes','assessor_url','photo_url']
  const lines = [cols.join(',')]
  for (const r of rows) {
    const cohorts = (r.lead_sources || []).map(s => s.source).join('|')
    const tags = (r.tags || []).join('|')
    const row = cols.map(c => {
      if (c === 'cohorts') return csvCell(cohorts)
      if (c === 'tags') return csvCell(tags)
      if (c === 'deal_score')      return csvCell(r.deal?.score)
      if (c === 'deal_tier')       return csvCell(r.deal?.score_tier)
      if (c === 'arv_estimate')    return csvCell(r.deal?.arv_estimate)
      if (c === 'rehab_estimate')  return csvCell(r.deal?.rehab_estimate)
      if (c === 'suggested_offer') return csvCell(r.deal?.suggested_offer)
      if (c === 'deal_flags')      return csvCell(r.deal?.flags)
      return csvCell(r[c])
    })
    lines.push(row.join(','))
  }
  const blob = new Blob([lines.join('\n') + '\n'], { type: 'text/csv;charset=utf-8' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a'); a.href = url; a.download = filename
  document.body.appendChild(a); a.click(); a.remove()
  setTimeout(() => URL.revokeObjectURL(url), 1000)
}

async function bulkUpdate(patch, mutator) {
  if (selectedIds.size === 0) return
  const ids = [...selectedIds]
  for (const id of ids) { const lead = leads.find(l => l.id === id); if (lead) mutator(lead) }
  populateTagFilters(); applyFilters(); updateTotals()
  const { error } = await sb.from('leads').update(patch).in('id', ids)
  if (error) alert('Bulk update failed: ' + error.message)
}

document.getElementById('selectAll').addEventListener('change', (e) => {
  if (e.target.checked) for (const l of filtered) selectedIds.add(l.id)
  else selectedIds.clear()
  refreshSelectionUI()
})
document.getElementById('bulkClear').addEventListener('click', () => { selectedIds.clear(); refreshSelectionUI() })
document.getElementById('bulkQueue').addEventListener('click', () => {
  const ids = [...selectedIds]
  if (!confirm(`Queue ${ids.length} lead(s) for outreach?`)) return
  bulkUpdate({ current_stage: 'queued' }, l => { l.current_stage = 'queued' })
})
document.getElementById('bulkStatus').addEventListener('change', (e) => {
  const stage = e.target.value; e.target.value = ''
  if (!stage) return
  const ids = [...selectedIds]
  if (!confirm(`Set ${ids.length} lead(s) to status "${stage}"?`)) return
  bulkUpdate({ current_stage: stage }, l => { l.current_stage = stage })
})
document.getElementById('bulkTag').addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return
  e.preventDefault()
  const tag = e.target.value.trim().toLowerCase().replace(/^#/, '').replace(/\s+/g, '-')
  if (!tag || selectedIds.size === 0) return
  e.target.value = ''
  const ids = [...selectedIds]
  if (!confirm(`Add tag "#${tag}" to ${ids.length} lead(s)?`)) return
  for (const id of ids) {
    const l = leads.find(x => x.id === id); if (!l) continue
    const newTags = Array.from(new Set([...(l.tags || []), tag]))
    l.tags = newTags
    await sb.from('leads').update({ tags: newTags }).eq('id', id)
  }
  populateCohortDropdown(); populateTagFilters(); applyFilters(); updateTotals()
})
document.getElementById('exportCsv').addEventListener('click', () => {
  const rows = selectedIds.size > 0 ? filtered.filter(l => selectedIds.has(l.id)) : filtered
  const stamp = new Date().toISOString().slice(0,10)
  downloadCsv(rows, `lincoln-leads-${stamp}.csv`)
})

sb.auth.onAuthStateChange((event, s) => {
  if (event === 'SIGNED_IN' && s && !session) {
    session = s
    if (ALLOWED_EMAILS.includes(session.user.email)) { showApp(); loadLeads() }
    else { sb.auth.signOut().then(() => showLogin('That email is not on the allowlist.')) }
  } else if (event === 'SIGNED_OUT') {
    session = null; showLogin()
  }
})
